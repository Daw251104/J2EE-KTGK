<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Trang chủ - Course Registration')}"></head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <div th:replace="~{layout :: navbar}"></div>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-7xl">
        <!-- Hero Section -->
        <div class="relative rounded-3xl overflow-hidden shadow-2xl mb-12 bg-indigo-900 text-white">
            <div class="absolute inset-0 bg-gradient-to-r from-primary to-indigo-900 opacity-90"></div>
            <div class="relative z-10 px-8 py-16 md:py-24 max-w-3xl">
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">Khám phá các học phần</h1>
                <p class="text-lg md:text-xl text-indigo-100 mb-8">Nâng cao kiến thức và kỹ năng của bạn thông qua các khóa học chất lượng từ các giảng viên hàng đầu.</p>
            </div>
            <!-- Decorative circle -->
            <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-secondary rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
        </div>

        <!-- Success/Error Message -->
        <div th:if="${successMessage}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-8 rounded shadow-sm" role="alert">
            <p th:text="${successMessage}"></p>
        </div>
        <div th:if="${errorMessage}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-8 rounded shadow-sm" role="alert">
            <p th:text="${errorMessage}"></p>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold text-gray-800">Danh sách Học phần (<span th:text="${totalItems}"></span>)</h2>
        </div>

        <!-- Course Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div th:each="course : ${listCourses}" class="bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm hover-lift flex flex-col h-full group">
                <div class="relative h-48 bg-gray-200 overflow-hidden">
                    <img th:if="${course.image != null and course.image != ''}" th:src="@{'/images/' + ${course.image}}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="Course Image">
                    <div th:unless="${course.image != null and course.image != ''}" class="w-full h-full flex items-center justify-center bg-gradient-to-br from-indigo-100 to-purple-100 text-indigo-300">
                        <i class="fa-solid fa-book-open text-5xl"></i>
                    </div>
                    <div class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-semibold text-primary shadow-sm" th:if="${course.category != null}" th:text="${course.category.name}">Category</div>
                </div>
                <div class="p-5 flex flex-col flex-grow">
                    <h3 class="text-xl font-bold text-gray-900 mb-2 line-clamp-2" th:text="${course.name}">Course Name</h3>
                    <div class="flex items-center text-sm text-gray-500 mb-2">
                        <i class="fa-solid fa-user-tie mr-2 text-indigo-400"></i>
                        <span th:text="${course.lecturer}">Lecturer</span>
                    </div>
                    <div class="mt-auto pt-4 border-t border-gray-100 flex items-center justify-between">
                        <span class="flex items-center text-sm font-medium text-gray-700">
                            <i class="fa-solid fa-star text-yellow-400 mr-1"></i>
                            <span th:text="${course.credits} + ' Tín chỉ'">3 Tín chỉ</span>
                        </span>
                        
                        <form sec:authorize="hasAuthority('STUDENT')" th:action="@{/enroll/{id}(id=${course.id})}" method="post">
                            <button type="submit" class="bg-primary/10 text-primary hover:bg-primary hover:text-white px-4 py-2 rounded-full text-sm font-semibold transition-colors duration-300">
                                Đăng ký
                            </button>
                        </form>
                        <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="bg-gray-100 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-full text-sm font-semibold transition-colors duration-300">
                            Đăng nhập để ĐK
                        </a>
                        <span sec:authorize="hasAuthority('ADMIN')" class="text-xs text-gray-400">Chế độ Admin</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <div th:if="${totalPages > 1}" class="mt-12 flex justify-center">
            <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                <a th:if="${currentPage > 1}" th:href="@{'/home?page=' + ${currentPage - 1} + ${keyword != null ? '&keyword=' + keyword : ''}}" class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                    <span class="sr-only">Previous</span>
                    <i class="fa-solid fa-chevron-left"></i>
                </a>
                
                <span th:each="i: ${#numbers.sequence(1, totalPages)}">
                    <a th:if="${currentPage != i}" th:href="@{'/home?page=' + ${i} + ${keyword != null ? '&keyword=' + keyword : ''}}" class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium" th:text="${i}"></a>
                    <span th:unless="${currentPage != i}" class="z-10 bg-primary border-primary text-white relative inline-flex items-center px-4 py-2 border text-sm font-medium" th:text="${i}"></span>
                </span>
                
                <a th:if="${currentPage < totalPages}" th:href="@{'/home?page=' + ${currentPage + 1} + ${keyword != null ? '&keyword=' + keyword : ''}}" class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                    <span class="sr-only">Next</span>
                    <i class="fa-solid fa-chevron-right"></i>
                </a>
            </nav>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
            &copy; 2026 EduPortal Course Registration. All rights reserved.
        </div>
    </footer>
</body>
</html>
