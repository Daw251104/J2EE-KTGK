<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Đăng ký - Course Registration')}"></head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen py-12">

    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-xl border border-gray-100 relative overflow-hidden">
        <!-- Decorative blobs -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-secondary rounded-full mix-blend-multiply filter blur-2xl opacity-20 translate-x-1/2 -translate-y-1/2"></div>
        <div class="absolute bottom-0 left-0 w-32 h-32 bg-primary rounded-full mix-blend-multiply filter blur-2xl opacity-20 -translate-x-1/2 translate-y-1/2"></div>

        <div class="relative z-10 text-center mb-8">
            <a th:href="@{/}" class="inline-block text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary mb-2">
                <i class="fa-solid fa-graduation-cap"></i> EduPortal
            </a>
            <h2 class="text-2xl font-bold text-gray-900 mt-4">Tạo tài khoản mới</h2>
            <p class="text-sm text-gray-500 mt-1">Tham gia cùng chúng tôi ngay hôm nay</p>
        </div>

        <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-r">
            <div class="flex">
                <div class="flex-shrink-0"><i class="fa-solid fa-circle-exclamation text-red-500"></i></div>
                <div class="ml-3"><p class="text-sm text-red-700" th:text="${error}">Lỗi đăng ký</p></div>
            </div>
        </div>

        <form th:action="@{/register}" th:object="${student}" method="post" class="space-y-5 relative z-10">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Tên đăng nhập</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-regular fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="username" th:field="*{username}" required
                           class="focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-gray-300 rounded-lg py-3 border outline-none transition-colors px-3"
                           placeholder="Nhập tên đăng nhập">
                </div>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-regular fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" id="email" th:field="*{email}" required
                           class="focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-gray-300 rounded-lg py-3 border outline-none transition-colors px-3"
                           placeholder="Nhập địa chỉ email">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Mật khẩu</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="password" th:field="*{password}" required minlength="6"
                           class="focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-gray-300 rounded-lg py-3 border outline-none transition-colors px-3"
                           placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-full shadow-md text-sm font-medium text-white bg-gradient-to-r from-primary to-indigo-600 hover:from-indigo-600 hover:to-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all hover:shadow-lg transform hover:-translate-y-0.5">
                    Đăng ký tài khoản
                </button>
            </div>
        </form>

        <p class="mt-8 text-center text-sm text-gray-600 relative z-10">
            Đã có tài khoản?
            <a th:href="@{/login}" class="font-medium text-primary hover:text-indigo-500 transition-colors">Đăng nhập</a>
        </p>
    </div>

</body>
</html>
