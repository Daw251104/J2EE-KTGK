<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Course Registration</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#ec4899',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <nav th:fragment="navbar" class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <a th:href="@{/}" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">
                            <i class="fa-solid fa-graduation-cap mr-2"></i>EduPortal
                        </a>
                    </div>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a th:href="@{/}" class="border-transparent text-gray-500 hover:border-primary hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">
                            Trang chủ
                        </a>
                        <a th:href="@{/admin/courses}" sec:authorize="hasAuthority('ADMIN')" class="border-transparent text-gray-500 hover:border-primary hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">
                            Quản lý Học phần
                        </a>
                        <a th:href="@{/my-courses}" sec:authorize="hasAuthority('STUDENT')" class="border-transparent text-gray-500 hover:border-primary hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">
                            Khóa học của tôi
                        </a>
                    </div>
                </div>
                
                <!-- Search Form -->
                <div class="hidden md:flex flex-1 items-center justify-center px-8">
                    <form th:action="@{/home}" method="get" class="w-full max-w-lg">
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                            </div>
                            <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm học phần..." 
                                   class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-full leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-1 focus:ring-primary focus:border-primary sm:text-sm transition duration-150 ease-in-out">
                        </div>
                    </form>
                </div>

                <div class="hidden sm:ml-6 sm:flex sm:items-center space-x-4">
                    <div sec:authorize="!isAuthenticated()">
                        <a th:href="@{/login}" class="text-gray-500 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium transition-colors">Đăng nhập</a>
                        <a th:href="@{/register}" class="bg-primary hover:bg-indigo-700 text-white px-4 py-2 rounded-full text-sm font-medium transition-all shadow-md hover:shadow-lg">Đăng ký</a>
                    </div>
                    <div sec:authorize="isAuthenticated()" class="flex items-center space-x-4">
                        <span class="text-sm font-medium text-gray-700">
                            Xin chào, <span class="font-bold text-primary" sec:authentication="name">User</span>!
                        </span>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="text-red-500 hover:text-red-700 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                                <i class="fa-solid fa-sign-out-alt mr-1"></i> Đăng xuất
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</body>
</html>
