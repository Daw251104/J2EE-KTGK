<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Cập nhật Học phần - Admin')}"></head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <div th:replace="~{layout :: navbar}"></div>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-3xl">
        <div class="mb-8 flex items-center">
            <a th:href="@{/admin/courses}" class="text-gray-500 hover:text-primary transition-colors mr-4">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </a>
            <h1 class="text-3xl font-bold border-b-4 border-primary inline-block pb-2 text-gray-800" th:text="${course.id == null ? 'Thêm mới Học phần' : 'Chỉnh sửa Học phần'}">
                Cập nhật Học phần
            </h1>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 p-8 relative">
            <!-- Decorative blobs -->
            <div class="absolute top-0 right-0 w-64 h-64 bg-primary rounded-full mix-blend-multiply filter blur-3xl opacity-5 translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

            <form th:action="@{/admin/courses/save}" th:object="${course}" method="POST" enctype="multipart/form-data" class="space-y-6 relative z-10">
                <input type="hidden" th:field="*{id}" />

                <div class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-semibold text-gray-700">Tên học phần <span class="text-red-500">*</span></label>
                        <input type="text" th:field="*{name}" id="name" required class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="credits" class="block text-sm font-semibold text-gray-700">Số tín chỉ <span class="text-red-500">*</span></label>
                            <input type="number" th:field="*{credits}" id="credits" required min="1" max="10" class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        </div>

                        <div>
                            <label for="category" class="block text-sm font-semibold text-gray-700">Danh mục <span class="text-red-500">*</span></label>
                            <select th:field="*{category.id}" id="category" class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all bg-white">
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Category</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label for="lecturer" class="block text-sm font-semibold text-gray-700">Giảng viên phụ trách <span class="text-red-500">*</span></label>
                        <input type="text" th:field="*{lecturer}" id="lecturer" required class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>

                    <div>
                        <label for="imageFile" class="block text-sm font-semibold text-gray-700">Hình ảnh minh họa</label>
                        
                        <div th:if="${course.image != null and course.image != ''}" class="mb-3 mt-2">
                            <p class="text-xs text-gray-500 mb-1">Ảnh hiện tại:</p>
                            <img th:src="@{'/images/' + ${course.image}}" class="h-32 object-cover rounded shadow-sm border border-gray-200">
                        </div>

                        <div id="dropZone" class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg bg-gray-50 hover:bg-gray-100 transition-colors cursor-pointer group">
                            <div class="space-y-1 text-center pointer-events-none">
                                <i class="fa-solid fa-cloud-arrow-up text-4xl text-gray-400 group-hover:text-primary transition-colors"></i>
                                <div class="flex text-sm text-gray-600 justify-center">
                                    <span id="fileNameSpan" class="font-medium text-primary">Tải ảnh lên</span>
                                    <p class="pl-1">hoặc kéo thả vào đây</p>
                                </div>
                                <p class="text-xs text-gray-500">PNG, JPG, GIF tối đa 10MB</p>
                            </div>
                            <input id="imageFile" name="imageFile" type="file" class="hidden" accept="image/*">
                        </div>
                    </div>
                </div>

                <div class="pt-6 flex items-center justify-end space-x-4 border-t border-gray-100">
                    <a th:href="@{/admin/courses}" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 py-2 px-6 rounded-full font-medium shadow-sm transition-colors text-sm">
                        Hủy
                    </a>
                    <button type="submit" class="bg-gradient-to-r from-primary to-indigo-600 hover:from-indigo-600 hover:to-primary text-white py-2 px-8 rounded-full font-bold shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all flex items-center">
                        <i class="fa-solid fa-save mr-2"></i> Lưu Học phần
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('imageFile');
        const fileNameSpan = document.getElementById('fileNameSpan');

        // Handle click on drop zone
        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        // Handle drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-primary', 'bg-indigo-50');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-primary', 'bg-indigo-50');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-primary', 'bg-indigo-50');
            
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                if (file.type.startsWith('image/')) {
                    fileInput.files = e.dataTransfer.files;
                    updateFileName(file.name);
                }
            }
        });

        // Handle normal file input change
        fileInput.addEventListener('change', function(e) {
            if(this.files && this.files.length > 0) {
                updateFileName(this.files[0].name);
            }
        });

        function updateFileName(name) {
            fileNameSpan.textContent = name;
            fileNameSpan.classList.remove('text-primary');
            fileNameSpan.classList.add('text-indigo-600', 'font-bold');
        }
    </script>
</body>
</html>
