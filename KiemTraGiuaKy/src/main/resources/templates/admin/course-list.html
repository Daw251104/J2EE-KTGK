<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Quản lý Học phần - Admin')}"></head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <div th:replace="~{layout :: navbar}"></div>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-7xl">
        <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold border-b-4 border-primary inline-block pb-2 text-gray-800">Quản lý Học phần</h1>
                <p class="text-gray-500 mt-2">Xem, thêm, sửa, xóa các học phần trong hệ thống.</p>
            </div>
            <div class="mt-4 md:mt-0">
                <a th:href="@{/admin/courses/new}" class="bg-primary hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-full shadow-md hover:shadow-lg transition-all flex items-center">
                    <i class="fa-solid fa-plus mr-2"></i> Thêm Học phần mới
                </a>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Hình ảnh</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Tên Học phần</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Tín chỉ</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Giảng viên</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Danh mục</th>
                            <th scope="col" class="px-6 py-4 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider">Hành động</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:each="course : ${listCourses}" class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${course.id}">1</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="h-12 w-16 bg-gray-100 rounded overflow-hidden flex items-center justify-center">
                                    <img th:if="${course.image != null and course.image != ''}" th:src="@{'/images/' + ${course.image}}" class="h-full w-full object-cover">
                                    <i th:unless="${course.image != null and course.image != ''}" class="fa-solid fa-image text-gray-400"></i>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${course.name}">Course Name</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                <span class="bg-blue-100 text-blue-800 text-xs font-semibold mr-2 px-2.5 py-0.5 rounded" th:text="${course.credits}">3</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${course.lecturer}">John Doe</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${course.category?.name}">IT</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium space-x-2">
                                <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="text-indigo-600 hover:text-indigo-900 bg-indigo-50 hover:bg-indigo-100 p-2 rounded-full transition-colors" title="Sửa">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </a>
                                <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="text-red-600 hover:text-red-900 bg-red-50 hover:bg-red-100 p-2 rounded-full transition-colors" title="Xóa" onclick="return confirm('Bạn có chắc chắn muốn xóa học phần này không?');">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listCourses)}">
                            <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                <i class="fa-solid fa-inbox text-4xl mb-3 text-gray-300"></i>
                                <p>Chưa có học phần nào. Hãy tạo học phần mới!</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div th:if="${totalPages > 1}" class="px-6 py-4 border-t border-gray-200 flex justify-center">
                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                    <a th:if="${currentPage > 1}" th:href="@{'/admin/courses?page=' + ${currentPage - 1}}" class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                        <span class="sr-only">Previous</span>
                        <i class="fa-solid fa-chevron-left"></i>
                    </a>
                    
                    <span th:each="i: ${#numbers.sequence(1, totalPages)}">
                        <a th:if="${currentPage != i}" th:href="@{'/admin/courses?page=' + ${i}}" class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium" th:text="${i}"></a>
                        <span th:unless="${currentPage != i}" class="z-10 bg-primary border-primary text-white relative inline-flex items-center px-4 py-2 border text-sm font-medium" th:text="${i}"></span>
                    </span>
                    
                    <a th:if="${currentPage < totalPages}" th:href="@{'/admin/courses?page=' + ${currentPage + 1}}" class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                        <span class="sr-only">Next</span>
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>
                </nav>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
            &copy; 2026 EduPortal Admin. All rights reserved.
        </div>
    </footer>
</body>
</html>
